name: main

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  up_tamer_commit: "869e7ab06cf23c5541a47f46209159fd51d8021f"
  up_pyperplan_commit: "ac2b04d2d41c20b15f7c4143c19947f9704d1888"
  up_fast_downward_commit: "eb1f0d801e140fffbdd6c1eb2b13e483299ab240"
  PYTHONUSERBASE: ${{ github.workspace }}/python_user_base
  PYTHONPATH: ${{ github.workspace }}/ros_ws/install/upf_msgs/local/lib/python3.10/dist-packages:${{ github.workspace }}/python_user_base/lib/python3.10/site-packages:/opt/ros/humble/local/lib/python3.10/dist-packages:/opt/ros/humble/lib/python3.10/site-packages
  RMW_IMPLEMENTATION: rmw_fastrtps_cpp

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up ROS 2 sources and key
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg lsb-release
          sudo curl -fsSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key | \
          gpg --dearmor | sudo tee /usr/share/keyrings/ros-archive-keyring.gpg > /dev/null
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] http://packages.ros.org/ros2/ubuntu $(lsb_release -cs) main" | \
          sudo tee /etc/apt/sources.list.d/ros2.list > /dev/null
          sudo apt-get update
      - name: Install missing dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libunwind-dev
      - name: Install ROS 2 Humble and tools
        run: |
          sudo apt install -y ros-humble-desktop \
            ros-humble-behaviortree-cpp-v3 \
            ros-humble-test-msgs \
            ros-humble-qt-gui-cpp \
            ros-humble-rqt-gui-cpp \
            ros-humble-navigation2 \
            ros-humble-nav2-bringup \
            ros-humble-rosidl-adapter \
            python3-colcon-common-extensions \
            python3-vcstool python3-pytest python3-colcon-coveragepy-result libfl-dev
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y wget python3-vcstool python3-pytest python3-colcon-coveragepy-result libfl-dev pip
          python3 -m pip install --user --upgrade pip 'setuptools<80' wheel
          python3 -m pip install --user 'numpy<2' 'scipy>=1.10,<1.12' 'ConfigSpace==1.2.0' 'protobuf>=5'
      - name: fix pytest name
        run: sudo ln -s /usr/bin/pytest-3 /usr/bin/pytest
      - name: Install unified planning from sources
        run: |
          git clone https://github.com/aiplan4eu/unified-planning.git
          cd unified-planning
          python3 -m pip install --user -r requirements.txt
          python3 -m pip install --user tarski[arithmetic]
          sudo apt install -y gringo
          if [ "${ACT:-}" != "true" ]; then
            python3 -m pip install --user -r dev-requirements.txt
            python3 -m pip install --user black==22.6.0
            python3 -m black --check --exclude=unified_planning/grpc/generated/ .
            python3 -m mypy unified_planning
            python3 scripts/test_imports.py
          fi
          cd ..
          git clone https://github.com/aiplan4eu/up-tamer
          python3 -m pip install --user up-tamer/
          git clone https://github.com/aiplan4eu/up-pyperplan
          python3 -m pip install --user up-pyperplan/
          python3 -m pip install --user unified_planning[tamer]
          python3 -m pip install --user 'numpy<2' 'scipy>=1.10,<1.12' 'ConfigSpace==1.2.0' 'protobuf>=5'
      - name: Create custom repos
        run: cp upf.repos /tmp/all.repos
      - name: Initialize rosdep
        run: |
          sudo apt install -y python3-rosdep
          sudo rosdep init || true
          rosdep update
      - name: build and test
        uses: ros-tooling/action-ros-ci@0.4.8
        with:
          package-name: upf4ros2 upf_msgs
          target-ros2-distro: humble
          vcs-repo-file-url: /tmp/all.repos
          colcon-defaults: |
            {
              "test": {
                "parallel-workers" : 1
              }
            }
          colcon-mixin-repository: https://raw.githubusercontent.com/colcon/colcon-mixin-repository/main/index.yaml
      - name: Codecov
        if: ${{ env.ACT != 'true' }}
        uses: codecov/codecov-action@v7
        with:
          files: ros_ws/lcov/total_coverage.info
          flags: unittests
          name: codecov-umbrella
          # yml: ./codecov.yml
          fail_ci_if_error: false
